services:
  eureka-server:
    build:
      context: ./backend/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - fms-net

  patient-service:
    build:
      context: ./backend/ms2
    container_name: patient-service
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    ports:
      - "8082:8082"
    networks:
      - fms-net

  appointment-service:
    build:
      context: ./backend/demo
    container_name: appointment-service
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - patient-service
    ports:
      - "8081:8081"
    networks:
      - fms-net

  records-service:
    build:
      context: ./backend/records-service
    container_name: records-service
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    ports:
      - "8083:8083"
    networks:
      - fms-net

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    depends_on:
      - appointment-service
      - patient-service
      - records-service
    ports:
      - "5173:80"
    networks:
      - fms-net

networks:
  fms-net:
    driver: bridge
